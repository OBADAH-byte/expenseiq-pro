<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goals — ExpenseIQ Pro</title>
<link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/animations.css" />
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand"><div class="sidebar-logo">💎</div><span class="sidebar-title">ExpenseIQ</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><span class="icon">🏠</span>Dashboard</a>
    <a href="expenses.html" class="sidebar-link"><span class="icon">💳</span>Expenses</a>
    <a href="goals.html" class="sidebar-link active"><span class="icon">🎯</span>Goals</a>
    <a href="badges.html" class="sidebar-link"><span class="icon">🏆</span>Badges</a>
    <a href="reports.html" class="sidebar-link"><span class="icon">📄</span>Reports</a>
    <a href="settings.html" class="sidebar-link"><span class="icon">⚙️</span>Settings</a>
    <a href="developer.html" class="sidebar-link"><span class="icon">👨‍💻</span>Developer</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="sidebar-avatar" id="user-avatar">U</div><div><div style="font-size:13px;font-weight:600;" id="user-name">Loading...</div></div></div>
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;" onclick="logout()">🚪 Logout</button>
  </div>
</aside>
<main class="main-content page-transition">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
    <div><h1 class="page-title">Savings Goals</h1><p class="page-subtitle">Set targets, track progress, achieve freedom</p></div>
    <button class="btn btn-primary" onclick="openGoalModal()">+ New Goal</button>
  </div>
  <div class="grid grid-3" id="goals-grid"><div class="card skeleton" style="height:200px;"></div><div class="card skeleton" style="height:200px;"></div></div>
</main>

<!-- Goal Modal -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title" id="goal-modal-title">Create Goal</h3><button class="modal-close" onclick="closeGoalModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Goal Name *</label><input type="text" id="goal-name" class="form-control" placeholder="e.g. Emergency Fund" /></div>
    <div class="grid grid-2" style="gap:12px;">
      <div class="form-group"><label class="form-label">Target Amount *</label><input type="number" id="goal-target" class="form-control" placeholder="5000" /></div>
      <div class="form-group"><label class="form-label">Currency</label><select id="goal-currency" class="form-control"><option>USD</option><option>EUR</option><option>GBP</option><option>INR</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Category</label>
      <select id="goal-category" class="form-control"><option>General</option><option>Emergency Fund</option><option>Vacation</option><option>Home</option><option>Vehicle</option><option>Education</option><option>Retirement</option><option>Other</option></select>
    </div>
    <div class="form-group"><label class="form-label">Deadline *</label><input type="date" id="goal-deadline" class="form-control" /></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-outline" onclick="closeGoalModal()" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" id="save-goal-btn" onclick="saveGoal()" style="flex:2;">Create Goal</button>
    </div>
  </div>
</div>

<!-- Add Amount Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title">Add to Goal</h3><button class="modal-close" onclick="closeAddModal()">✕</button></div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;" id="add-goal-name">Adding to goal...</p>
    <div class="form-group"><label class="form-label">Amount to Add</label><input type="number" id="add-amount" class="form-control" placeholder="100" min="0.01" step="0.01" /></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-outline" onclick="closeAddModal()" style="flex:1;">Cancel</button>
      <button class="btn btn-success" onclick="addToGoal()" style="flex:2;">Add Amount</button>
    </div>
  </div>
</div>

<script src="js/theme.js"></script><script src="js/api.js"></script><script src="js/goals.js"></script>
</body>
</html>
